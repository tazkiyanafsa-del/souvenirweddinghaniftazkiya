<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Souvenir Wedding</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:20px;
    font-size:18px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
    <h1>Cek Souvenir</h1>

    <input type="text" id="kode" placeholder="Masukkan kode unik">

    <button onclick="cekSouvenir()">Cek Souvenir</button>

    <div class="result" id="hasil"></div>
</div>

<script>
const supabaseUrl = 'https://tkbvfpcqxdyrehfacebe.supabase.co';

const supabaseKey = 'sb_publishable_ALQvUONN1ww8dEl6hmGM-A_F5dF2HFq';

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function cekSouvenir(){

    const kode = document.getElementById('kode').value;
    const hasil = document.getElementById('hasil');

    hasil.innerHTML = "Loading...";

    const { data, error } = await supabase
    .from('tamu')
    .select('*')
    .eq('kode', kode)
    .single();

    if(error || !data){
        hasil.innerHTML = "❌ Data tidak ditemukan";
        hasil.style.color = "red";
        return;
    }

    if(data.status === true){
        hasil.innerHTML = "⚠️ Souvenir sudah diambil";
        hasil.style.color = "orange";
        return;
    }

    const update = await supabase
    .from('tamu')
    .update({
        status:true,
        waktu_ambil:new Date()
    })
    .eq('kode', kode);

    hasil.innerHTML = "✅ Souvenir berhasil diambil";
    hasil.style.color = "green";
}
</script>

</body>
</html>
