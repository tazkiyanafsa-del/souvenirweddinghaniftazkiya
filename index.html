<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Nama Souvenir</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:20px;
}

.card{
  background:white;
  width:100%;
  max-width:550px;
  padding:40px;
  border-radius:30px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  text-align:center;
}

h1{
  font-size:48px;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:18px;
  border-radius:15px;
  border:1px solid #ccc;
  margin-bottom:15px;
  font-size:18px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:15px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.btn-blue{
  background:#2563eb;
  color:white;
}

.btn-green{
  background:#16a34a;
  color:white;
}

.btn-red{
  background:#dc2626;
  color:white;
  width:auto;
  padding:10px 14px;
}

.result{
  margin-top:35px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:green;
  line-height:1.8;
}

.admin-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  width:auto;
  padding:12px 18px;
  border-radius:50px;
  background:#111827;
  color:white;
  font-size:14px;
}

.admin-panel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  width:90%;
  max-width:500px;
  padding:30px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  display:none;
  z-index:1000;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

.name-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border:1px solid #ddd;
  border-radius:15px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div class="card">

  <h1>Cek Nama</h1>

  <input type="text" id="namaInput" placeholder="Masukkan nama">

  <button class="btn-blue" onclick="cekNama()">Cari Nama</button>

  <div class="result" id="hasil"></div>

</div>

<button class="admin-toggle" onclick="bukaAdmin()">
⚙ Admin
</button>

<div class="overlay" id="overlay"></div>

<div class="admin-panel" id="adminPanel">

  <h2 style="text-align:center;">Admin Panel</h2>

  <input type="password" id="passwordInput" placeholder="Masukkan password admin">

  <button class="btn-blue" onclick="loginAdmin()">Login Admin</button>

  <div id="adminArea" style="display:none; margin-top:25px;">

    <input type="text" id="newName" placeholder="Tambah nama baru">

    <button class="btn-green" onclick="tambahNama()">Tambah Nama</button>

    <div id="nameList" style="margin-top:20px;"></div>

  </div>

  <button
    onclick="tutupAdmin()"
    style="margin-top:15px;background:#6b7280;color:white;"
  >
    Tutup
  </button>

</div>

<script>
const ADMIN_PASSWORD = "admin123";

let daftarNama = JSON.parse(localStorage.getItem("daftarNama")) || [
  "tazkiya nafsa",
  "hanif fahreza",
  "alya safira"
];

function simpanData(){
  localStorage.setItem("daftarNama", JSON.stringify(daftarNama));
}

function cekNama(){
  const input = document
    .getElementById("namaInput")
    .value
    .trim()
    .toLowerCase();

  const hasil = document.getElementById("hasil");

  if(daftarNama.includes(input)){
    hasil.style.color = "green";

    hasil.innerHTML = `
      ✅ Nama ditemukan:
      <br><br>
      ${input}
      <br>
      ─────────
      <br>
      🎁 Silahkan Ambil Souvenir
    `;
  } else {
    hasil.style.color = "red";
    hasil.innerHTML = "❌ Data tidak ditemukan";
  }
}

function bukaAdmin(){
  document.getElementById("adminPanel").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function tutupAdmin(){
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

function loginAdmin(){
  const password = document.getElementById("passwordInput").value;

  if(password === ADMIN_PASSWORD){
    document.getElementById("adminArea").style.display = "block";
    tampilkanNama();
    alert("Login berhasil");
  } else {
    alert("Password salah");
  }
}

function tambahNama(){
  const nama = document
    .getElementById("newName")
    .value
    .trim()
    .toLowerCase();

  if(!nama){
    alert("Nama kosong");
    return;
  }

  if(daftarNama.includes(nama)){
    alert("Nama sudah ada");
    return;
  }

  daftarNama.push(nama);

  simpanData();
  tampilkanNama();

  document.getElementById("newName").value = "";
}

function hapusNama(nama){
  daftarNama = daftarNama.filter(n => n !== nama);

  simpanData();
  tampilkanNama();
}

function tampilkanNama(){
  const list = document.getElementById("nameList");

  list.innerHTML = "";

  daftarNama.forEach(nama => {
    list.innerHTML += `
      <div class="name-item">
        <span>${nama}</span>

        <button class="btn-red" onclick="hapusNama('${nama}')">
          Hapus
        </button>
      </div>
    `;
  });
}
</script>

</body>
</html>
