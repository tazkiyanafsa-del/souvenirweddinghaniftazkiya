<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Souvenir</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:20px;
width:90%;
max-width:400px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

h1{
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:20px;
font-size:18px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
margin-bottom:15px;
}

.admin-btn{
background:black;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Cek Souvenir</h1>

<input type="text" id="kode" placeholder="Masukkan kode unik">

<button onclick="cekSouvenir()">Cek Souvenir</button>

<button class="admin-btn" onclick="adminLogin()">Admin</button>

<div class="result" id="hasil"></div>

</div>

<script>

const supabaseUrl = 'https://tkbvfpcqxdyrehfacebe.supabase.co';

const supabaseKey = 'sb_publishable_ALQvUONN1ww8dEl6hmGM-A_F5dF2HFq';

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function cekSouvenir(){

const kode = document.getElementById('kode').value.trim();

const hasil = document.getElementById('hasil');

if(!kode){
hasil.innerHTML = "Isi kode dulu";
hasil.style.color = "red";
return;
}

hasil.innerHTML = "Loading...";

const { data, error } = await supabase
.from('guests')
.select('*')
.eq('kode', kode)
.single();

if(error || !data){
hasil.innerHTML = "❌ Data tidak ditemukan";
hasil.style.color = "red";
return;
}

if(data.status === true){
hasil.innerHTML = "⚠️ Souvenir sudah diambil";
hasil.style.color = "orange";
return;
}

await supabase
.from('guests')
.update({
status:true,
waktu_ambil:new Date()
})
.eq('kode', kode);

hasil.innerHTML = "✅ Souvenir berhasil diambil";
hasil.style.color = "green";

document.getElementById('kode').value = "";
}

function adminLogin(){

const password = prompt("Masukkan password admin");

if(password === "admin123"){

window.open(
"https://supabase.com/dashboard/project/tkbvfpcqxdyrehfacebe/editor",
"_blank"
);

}else{

alert("Password salah");

}
}

</script>

</body>
</html>
