<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cek Souvenir Pernikahan</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:450px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:18px;
    font-size:18px;
    border-radius:12px;
    border:1px solid #ccc;
    margin-bottom:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:15px;
}

.btn-check{
    background:#2563eb;
    color:white;
}

.btn-admin{
    background:black;
    color:white;
}

.result{
    margin-top:25px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.success{
    color:green;
}

.error{
    color:red;
}

.admin-box{
    display:none;
    margin-top:25px;
    border-top:1px solid #ddd;
    padding-top:20px;
}

.admin-item{
    background:#f7f7f7;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<h1>Cek Souvenir</h1>

<input type="text" id="kode" placeholder="Masukkan kode unik">

<button class="btn-check" onclick="cekSouvenir()">
Cek Souvenir
</button>

<button class="btn-admin" onclick="bukaAdmin()">
Admin
</button>

<div id="hasil" class="result"></div>

<div id="adminBox" class="admin-box">
    <h3>Dashboard Admin</h3>
    <div id="adminData"></div>
</div>

</div>

<script>

const supabaseUrl = "https://tkbvfpcqxdyrehfacebe.supabase.co";

const supabaseKey = "sb_publishable_ALQvUONN1ww8dEl6hmGM-A_F5dF2HFq";

const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function cekSouvenir(){

    const kode = document
        .getElementById("kode")
        .value
        .trim();

    const hasil = document.getElementById("hasil");

    if(kode === ""){
        hasil.innerHTML =
        "<span class='error'>Isi kode dulu</span>";
        return;
    }

    const { data, error } = await supabaseClient
        .from("tamu")
        .select("*")
        .eq("kode", kode)
        .single();

    if(error || !data){
        hasil.innerHTML =
        "<span class='error'>❌ Data tidak ditemukan</span>";
        return;
    }

    if(data.status === true){
        hasil.innerHTML =
        "<span class='error'>⚠️ Souvenir sudah diambil</span>";
        return;
    }

    const waktu = new Date().toISOString();

    await supabaseClient
        .from("tamu")
        .update({
            status:true,
            waktu_ambil:waktu
        })
        .eq("kode", kode);

    hasil.innerHTML =
    "<span class='success'>✅ Souvenir berhasil diambil</span>";

    document.getElementById("kode").value = "";
}

async function bukaAdmin(){

    const password = prompt("Masukkan password admin");

    if(password !== "admin123"){
        alert("Password salah");
        return;
    }

    document.getElementById("adminBox").style.display = "block";

    const { data } = await supabaseClient
        .from("tamu")
        .select("*")
        .order("waktu_ambil", { ascending:false });

    let html = "";

    data.forEach(item => {

        html += `
        <div class="admin-item">
            <b>${item.nama}</b><br>
            Kode: ${item.kode}<br>
            Status: ${item.status ? "SUDAH AMBIL" : "BELUM"}<br>
            Waktu: ${item.waktu_ambil ?? "-"}
        </div>
        `;
    });

    document.getElementById("adminData").innerHTML = html;
}

</script>

</body>
</html>
